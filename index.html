<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物件写真 自動加工アプリ(Netlify版)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500&display=swap">
<style>
  :root {
    --main: #2f6f4f;
    --bg: #f6f7f5;
    --card: #ffffff;
    --border: #dfe3df;
    --text: #26312a;
    --muted: #6b756e;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; background:var(--bg); color:var(--text); }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; background:var(--main); color:#fff; }
  header h1 { font-size:18px; margin:0; }
  header button { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.4); color:#fff; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; }
  main { max-width:980px; margin:24px auto; padding:0 16px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
  #dropzone { border:2px dashed #b7c3ba; border-radius:10px; padding:40px 20px; text-align:center; color:var(--muted); cursor:pointer; }
  #dropzone.dragover { background:#eef5f0; border-color:var(--main); }
  #fileInput { display:none; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; margin-top:16px; }
  .thumb { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }
  .thumb img { width:100%; height:110px; object-fit:cover; display:block; }
  .thumb .meta { padding:8px; font-size:12px; }
  .thumb .fname { color:var(--muted); word-break:break-all; margin-bottom:6px; height:2.4em; overflow:hidden; }
  .tagrow { display:flex; gap:4px; flex-wrap:wrap; }
  .tagrow label { font-size:11px; border:1px solid var(--border); border-radius:5px; padding:3px 6px; cursor:pointer; }
  .tagrow input { display:none; }
  .tag-main:has(input:checked) { background:#ffe9c7; border-color:#e0a94a; }
  .tag-sky:has(input:checked) { background:#d9ecff; border-color:#6fa8dc; }
  .tag-none:has(input:checked) { background:#eee; }
  .remove-btn { float:right; background:none; border:none; color:#c0392b; cursor:pointer; font-size:12px; }
  #processBtn { background:var(--main); color:#fff; border:none; padding:12px 24px; border-radius:8px; font-size:15px; cursor:pointer; }
  #processBtn:disabled { background:#aab6ae; cursor:not-allowed; }
  #log { font-size:13px; color:var(--muted); margin-top:14px; white-space:pre-wrap; line-height:1.7; max-height:220px; overflow-y:auto; }
  #warnBanner { display:none; background:#fff2d6; color:#8a6100; border:1px solid #e0c079; border-radius:8px; padding:10px 14px; font-size:13px; margin-top:14px; }
  .result-grid img { width:100%; border-radius:6px; border:1px solid var(--border); }
  .result-grid .thumb .meta { text-align:center; }
  .result-grid a { font-size:12px; color:var(--main); }
  .result-grid .fail { color:#c0392b; font-size:11px; }
  .toolbar { display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap; }
  #settingsModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); align-items:center; justify-content:center; z-index:10; }
  #settingsModal .box { background:#fff; width:560px; max-width:92vw; max-height:88vh; overflow-y:auto; border-radius:10px; padding:24px; }
  #settingsModal h2 { margin-top:0; font-size:16px; }
  #settingsModal label { display:block; font-size:13px; margin:14px 0 4px; color:var(--muted); }
  #settingsModal input[type=text], #settingsModal input[type=number], #settingsModal input[type=color] { width:100%; padding:8px; border:1px solid var(--border); border-radius:6px; font-size:13px; }
  #settingsModal textarea { width:100%; height:110px; padding:8px; border:1px solid var(--border); border-radius:6px; font-size:12px; font-family:inherit; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:18px; }
  .btn-secondary { background:#eee; border:none; padding:9px 18px; border-radius:6px; cursor:pointer; }
  .btn-primary { background:var(--main); color:#fff; border:none; padding:9px 18px; border-radius:6px; cursor:pointer; }
  .hint { font-size:12px; color:var(--muted); margin-top:4px; }
</style>
</head>
<body>

<header>
  <h1>物件写真 自動加工アプリ(Netlify版)</h1>
  <button id="openSettings">⚙ 設定</button>
</header>

<main>
  <div class="card">
    <div id="dropzone">
      画像をドラッグ&ドロップ、またはクリックして選択<br>
      <span class="hint">複数枚まとめてOK(jpg / png / webp)。処理はブラウザ内で完結し、AI加工のみサーバーを経由します。</span>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*">
    <div class="grid" id="fileGrid"></div>
    <div class="toolbar">
      <button id="processBtn" disabled>処理開始</button>
      <span class="hint" id="countHint"></span>
    </div>
    <div id="log"></div>
    <div id="warnBanner"></div>
  </div>

  <div class="card" id="resultCard" style="display:none;">
    <h2 style="margin-top:0;">加工結果</h2>
    <div class="toolbar">
      <button class="btn-primary" id="zipBtn">ZIPで一括ダウンロード</button>
    </div>
    <div class="grid result-grid" id="resultGrid"></div>
  </div>
</main>

<div id="settingsModal">
  <div class="box">
    <h2>設定</h2>

    <label>使用モデル</label>
    <input type="text" id="cfgModel" value="gpt-image-2">
    <div class="hint">OpenAI APIキーはサーバー側(Netlifyの環境変数 OPENAI_API_KEY)で管理しています。ブラウザには保存されません。</div>

    <label>出力サイズ(px)</label>
    <div class="row2">
      <input type="number" id="cfgWidth" value="640">
      <input type="number" id="cfgHeight" value="480">
    </div>

    <label>透かし文字</label>
    <input type="text" id="cfgWmText" value="東京マンション">

    <div class="row2">
      <div>
        <label>透かしの色</label>
        <input type="color" id="cfgWmColor" value="#ffffff">
      </div>
      <div>
        <label>不透明度(0〜1、小さいほど薄い)</label>
        <input type="number" id="cfgWmOpacity" value="0.15" step="0.01" min="0" max="1">
      </div>
    </div>

    <div class="row3">
      <div>
        <label>横位置(0〜1)</label>
        <input type="number" id="cfgWmX" value="0.62" step="0.01" min="0" max="1">
      </div>
      <div>
        <label>縦位置(0〜1)</label>
        <input type="number" id="cfgWmY" value="0.5" step="0.01" min="0" max="1">
      </div>
      <div>
        <label>文字の大きさ(画像高さに対する割合)</label>
        <input type="number" id="cfgWmFont" value="0.06" step="0.005" min="0.02" max="0.2">
      </div>
    </div>

    <label>青空加工プロンプト</label>
    <textarea id="cfgSkyPrompt"></textarea>

    <label>ホームステージングプロンプト</label>
    <textarea id="cfgStagingPrompt"></textarea>

    <div class="modal-actions">
      <button class="btn-secondary" id="closeSettings">閉じる</button>
      <button class="btn-primary" id="saveSettings">保存</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const DEFAULT_SKY_PROMPT = `#目的
元画像のマンションの形状・構図・階数・外観・バルコニー・周辺の道路・植栽・駐車場・自転車置き場はそのまま維持し、天気だけを夏の晴天に変更してください。
#前提
・空は鮮やかな青空にし、草木があれば鮮やかな色に。
・マンション全体が明るく見えるように、夏の午前9時〜10時半頃の太陽光が画面左上の斜め前方から当たる設定にしてください。
・外壁とバルコニーに自然な明るさと清潔感を出し、建物・地面・植栽にも晴れた日に合う光を反映させてください。
・影は適度に出し、立体感はあるが強すぎない自然な影にしてください。
・曇天のような暗さはなくし、合成感のない自然な晴れの日のマンション写真に仕上げてください。
・この画像はイメージです等の注意書きを画像内に入れないでください`;

const DEFAULT_STAGING_PROMPT = `#目的
ユーザーが提供した部屋の画像に適した家具を入れて
#前提
・ミニマルな家具
・この画像はイメージです等の注意書きを画像内に入れないでください
#必ず入れる家具
・絵画
・観葉植物
・フロアランプ
・ラグ
・ソファー`;

const DEFAULT_CFG = {
  model: "gpt-image-2",
  width: 640,
  height: 480,
  wmText: "東京マンション",
  wmColor: "#ffffff",
  wmOpacity: 0.15,
  wmX: 0.62,
  wmY: 0.5,
  wmFont: 0.06,
  skyPrompt: DEFAULT_SKY_PROMPT,
  stagingPrompt: DEFAULT_STAGING_PROMPT,
};

function loadCfg() {
  try {
    const saved = JSON.parse(localStorage.getItem("bukken_cfg") || "{}");
    return { ...DEFAULT_CFG, ...saved };
  } catch {
    return { ...DEFAULT_CFG };
  }
}
function saveCfg(cfg) {
  localStorage.setItem("bukken_cfg", JSON.stringify(cfg));
}

let cfg = loadCfg();
let files = []; // {file, tag, id}
let results = []; // {name, blob}

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileGrid = document.getElementById('fileGrid');
const processBtn = document.getElementById('processBtn');
const countHint = document.getElementById('countHint');
const logEl = document.getElementById('log');
const warnBanner = document.getElementById('warnBanner');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => addFiles(fileInput.files));

function addFiles(list) {
  for (const f of list) {
    if (!f.type.startsWith('image/')) continue;
    files.push({ file: f, tag: 'none', id: crypto.randomUUID() });
  }
  renderGrid();
}

function renderGrid() {
  fileGrid.innerHTML = '';
  for (const item of files) {
    const url = URL.createObjectURL(item.file);
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `
      <img src="${url}">
      <div class="meta">
        <div class="fname">${item.file.name} <button class="remove-btn" data-id="${item.id}">✕</button></div>
        <div class="tagrow">
          <label class="tag-main"><input type="radio" name="tag-${item.id}" value="main" ${item.tag==='main'?'checked':''}><span>メイン</span></label>
          <label class="tag-sky"><input type="radio" name="tag-${item.id}" value="sky" ${item.tag==='sky'?'checked':''}><span>青空加工</span></label>
          <label class="tag-none"><input type="radio" name="tag-${item.id}" value="none" ${item.tag==='none'?'checked':''}><span>そのまま</span></label>
        </div>
      </div>`;
    div.querySelectorAll('input[type=radio]').forEach(r => r.addEventListener('change', () => { item.tag = r.value; }));
    div.querySelector('.remove-btn').addEventListener('click', () => { files = files.filter(x => x.id !== item.id); renderGrid(); });
    fileGrid.appendChild(div);
  }
  countHint.textContent = files.length ? `${files.length}枚選択中` : '';
  processBtn.disabled = files.length === 0;
}

function log(msg) {
  logEl.textContent += (logEl.textContent ? '\n' : '') + msg;
  logEl.scrollTop = logEl.scrollHeight;
}

async function callAiEdit(file, prompt) {
  const fd = new FormData();
  fd.append('image', file, file.name);
  fd.append('prompt', prompt);
  fd.append('model', cfg.model);
  const res = await fetch('/api/ai-edit', { method: 'POST', body: fd });
  const contentType = res.headers.get('content-type') || '';
  if (!contentType.includes('application/json')) {
    // /api/ai-edit が呼ばれず、Netlifyの404ページ等が返ってきているケース
    throw new Error(`AI加工エンドポイントに到達できませんでした(status ${res.status})。Edge Functionが未デプロイの可能性があります。`);
  }
  const data = await res.json();
  if (!res.ok || data.error) {
    const debugStr = data.debug ? ` [debug: ${JSON.stringify(data.debug)}]` : '';
    throw new Error((data.error || `HTTP ${res.status}`) + debugStr);
  }
  return data.b64_json;
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function drawCover(ctx, img, dw, dh) {
  const iw = img.width, ih = img.height;
  const scale = Math.max(dw / iw, dh / ih);
  const sw = dw / scale, sh = dh / scale;
  const sx = (iw - sw) / 2, sy = (ih - sh) / 2;
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, dw, dh);
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

let fontsReadyPromise = null;
function ensureFontsReady() {
  if (!fontsReadyPromise) {
    fontsReadyPromise = Promise.race([
      Promise.all([
        document.fonts.load('500 40px "M PLUS Rounded 1c"'),
        document.fonts.ready,
      ]),
      new Promise(resolve => setTimeout(resolve, 1500)), // フォント読み込みが遅い場合のフォールバック
    ]);
  }
  return fontsReadyPromise;
}

function drawWatermark(ctx, width, height) {
  const fontSize = Math.round(height * cfg.wmFont);
  ctx.save();
  ctx.font = `500 ${fontSize}px "M PLUS Rounded 1c", "Zen Maru Gothic", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif`;
  ctx.fillStyle = hexToRgba(cfg.wmColor, cfg.wmOpacity);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.18)';
  ctx.shadowBlur = fontSize * 0.1;
  const x = width * cfg.wmX;
  const y = height * cfg.wmY;
  ctx.fillText(cfg.wmText, x, y);
  ctx.restore();
}

async function finishImage(img, name) {
  const canvas = document.createElement('canvas');
  canvas.width = cfg.width;
  canvas.height = cfg.height;
  const ctx = canvas.getContext('2d');
  drawCover(ctx, img, cfg.width, cfg.height);
  drawWatermark(ctx, cfg.width, cfg.height);
  return new Promise(resolve => canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.92));
}

processBtn.addEventListener('click', async () => {
  processBtn.disabled = true;
  logEl.textContent = '';
  warnBanner.style.display = 'none';
  results = [];
  document.getElementById('resultCard').style.display = 'none';

  await ensureFontsReady();

  let failCount = 0;

  for (const item of files) {
    const label = item.tag === 'main' ? 'ホームステージング' : item.tag === 'sky' ? '青空加工' : 'そのまま';
    log(`${item.file.name}: ${label} 処理中…`);
    let sourceImg;
    try {
      if (item.tag === 'main' || item.tag === 'sky') {
        const prompt = item.tag === 'main' ? cfg.stagingPrompt : cfg.skyPrompt;
        const b64 = await callAiEdit(item.file, prompt);
        sourceImg = await loadImage(`data:image/png;base64,${b64}`);
        log(`${item.file.name}: ${label} 完了`);
      } else {
        const dataUrl = await fileToDataUrl(item.file);
        sourceImg = await loadImage(dataUrl);
      }
    } catch (e) {
      failCount++;
      log(`${item.file.name}: ${label} 失敗(${e.message}) → 元画像のままリサイズ・透かしへ`);
      const dataUrl = await fileToDataUrl(item.file);
      sourceImg = await loadImage(dataUrl);
    }

    const blob = await finishImage(sourceImg, item.file.name);
    const outName = item.file.name.replace(/\.[^.]+$/, '') + '_processed.jpg';
    results.push({ name: outName, blob });
    log(`${item.file.name}: リサイズ・透かし完了 → ${outName}`);
  }

  if (failCount > 0) {
    warnBanner.style.display = 'block';
    warnBanner.textContent = `⚠ ${failCount}枚でAI加工が失敗し、元画像のまま処理されました。上のログにエラー内容が出ています。「Edge Functionが未デプロイ」と出ている場合は、Netlify CLIまたはGit連携でのデプロイが必要です(ドラッグ&ドロップ配布ではAI加工機能が動きません)。`;
  }

  showResults();
  processBtn.disabled = false;
});

function showResults() {
  const card = document.getElementById('resultCard');
  const grid = document.getElementById('resultGrid');
  grid.innerHTML = '';
  for (const r of results) {
    const url = URL.createObjectURL(r.blob);
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `<img src="${url}"><div class="meta"><a href="${url}" download="${r.name}">${r.name}</a></div>`;
    grid.appendChild(div);
  }
  card.style.display = results.length ? 'block' : 'none';
}

document.getElementById('zipBtn').addEventListener('click', async () => {
  if (!results.length) return;
  const zip = new JSZip();
  for (const r of results) zip.file(r.name, r.blob);
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'processed_photos.zip';
  a.click();
  URL.revokeObjectURL(url);
});

// --- settings ---
const modal = document.getElementById('settingsModal');
document.getElementById('openSettings').addEventListener('click', openSettings);
document.getElementById('closeSettings').addEventListener('click', () => modal.style.display = 'none');

function openSettings() {
  document.getElementById('cfgModel').value = cfg.model;
  document.getElementById('cfgWidth').value = cfg.width;
  document.getElementById('cfgHeight').value = cfg.height;
  document.getElementById('cfgWmText').value = cfg.wmText;
  document.getElementById('cfgWmColor').value = cfg.wmColor;
  document.getElementById('cfgWmOpacity').value = cfg.wmOpacity;
  document.getElementById('cfgWmX').value = cfg.wmX;
  document.getElementById('cfgWmY').value = cfg.wmY;
  document.getElementById('cfgWmFont').value = cfg.wmFont;
  document.getElementById('cfgSkyPrompt').value = cfg.skyPrompt;
  document.getElementById('cfgStagingPrompt').value = cfg.stagingPrompt;
  modal.style.display = 'flex';
}

document.getElementById('saveSettings').addEventListener('click', () => {
  cfg = {
    model: document.getElementById('cfgModel').value || 'gpt-image-2',
    width: parseInt(document.getElementById('cfgWidth').value, 10) || 640,
    height: parseInt(document.getElementById('cfgHeight').value, 10) || 480,
    wmText: document.getElementById('cfgWmText').value || '東京マンション',
    wmColor: document.getElementById('cfgWmColor').value || '#ffffff',
    wmOpacity: parseFloat(document.getElementById('cfgWmOpacity').value),
    wmX: parseFloat(document.getElementById('cfgWmX').value),
    wmY: parseFloat(document.getElementById('cfgWmY').value),
    wmFont: parseFloat(document.getElementById('cfgWmFont').value),
    skyPrompt: document.getElementById('cfgSkyPrompt').value || DEFAULT_SKY_PROMPT,
    stagingPrompt: document.getElementById('cfgStagingPrompt').value || DEFAULT_STAGING_PROMPT,
  };
  if (Number.isNaN(cfg.wmOpacity)) cfg.wmOpacity = DEFAULT_CFG.wmOpacity;
  if (Number.isNaN(cfg.wmX)) cfg.wmX = DEFAULT_CFG.wmX;
  if (Number.isNaN(cfg.wmY)) cfg.wmY = DEFAULT_CFG.wmY;
  if (Number.isNaN(cfg.wmFont)) cfg.wmFont = DEFAULT_CFG.wmFont;
  saveCfg(cfg);
  modal.style.display = 'none';
});
</script>

</body>
</html>
